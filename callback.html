<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhiloShorts — TikTok Bağlantısı</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f0f0f; color: #f0f0f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .container { text-align: center; padding: 40px 24px; max-width: 480px; }
    .logo { font-size: 22px; font-weight: 700; color: #a78bfa; margin-bottom: 48px; }
    .spinner { width: 56px; height: 56px; border: 4px solid #2a2a4a; border-top-color: #a78bfa; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 28px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 26px; font-weight: 700; margin-bottom: 12px; }
    p { font-size: 15px; color: #9ca3af; line-height: 1.6; }
    .check { font-size: 64px; margin-bottom: 20px; }
    .btn { display: inline-block; background: #a78bfa; color: #fff; padding: 14px 32px; border-radius: 10px; text-decoration: none; font-weight: 700; font-size: 15px; margin-top: 28px; }
    .error-box { background: #2d1010; border: 1px solid #7f1d1d; border-radius: 12px; padding: 20px; margin-top: 20px; }
    .error-box p { color: #fca5a5; font-size: 13px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">PhiloShorts</div>

    <div id="loading">
      <div class="spinner"></div>
      <h1>TikTok hesabın bağlanıyor...</h1>
      <p>Lütfen bekle.</p>
    </div>

    <div id="success" style="display:none">
      <div class="check">✅</div>
      <h1>Hesap Bağlandı!</h1>
      <p id="success-msg">TikTok hesabın PhiloShorts'a başarıyla bağlandı. İlk video 24 saat içinde yayınlanacak.</p>
      <a href="/dashboard.html" class="btn">Dashboard'a Git</a>
    </div>

    <div id="error" style="display:none">
      <div class="check">❌</div>
      <h1>Bağlantı Başarısız</h1>
      <div class="error-box"><p id="error-msg">Bir hata oluştu.</p></div>
      <a href="/" class="btn" style="background:#4b5563;margin-top:20px">Geri Dön</a>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const connected = params.get('connected');
    const user = params.get('user');
    const error = params.get('error');
    const errorDesc = params.get('error_description');

    document.getElementById('loading').style.display = 'none';

    if (connected === '1') {
      document.getElementById('success').style.display = 'block';
      if (user) {
        document.getElementById('success-msg').textContent =
          `@${user} hesabın PhiloShorts'a bağlandı. İlk video 24 saat içinde yayınlanacak.`;
        // Kullanıcı bilgisini localStorage'a kaydet (dashboard için)
        localStorage.setItem('tt_user', user);
      }
    } else {
      document.getElementById('error').style.display = 'block';
      const msg = errorDesc || error || 'Bilinmeyen hata.';
      document.getElementById('error-msg').textContent = msg;
    }
  </script>
</body>
</html>
